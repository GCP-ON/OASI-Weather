project: OASI ALL SKY CAMERA
camera_model: Starlight Express Oculus 3
interface: ASCOM
protocol: COM

# ASCOM Camera Configuration
ascom:
  device_id: "ASCOM.sxCamera.Imaging0.Camera"  # Primary ASCOM ProgID (detected on this host)
  # Optional fallback ProgIDs tried in order if `device_id` fails.
  # Example for ASCOM Alpaca bridge or vendor-specific drivers:
  # device_ids:
  #   - "ASCOM.SXCamera.Camera"
  #   - "ASCOM.StarlightXpress.Camera"
  #   - "ASCOM.Alpaca.Camera"
  device_ids:
    - "ASCOM.sxCamera.Imaging0.Camera"
    - "ASCOM.SXCamera.Camera"
    - "ASCOM.Simulator.Camera"
    - "CCDSimulator.Camera"
  use_chooser_on_failure: false  # Open ASCOM chooser dialog if all IDs fail
  connect_timeout: 10  # seconds
  retry_attempts: 3

# Camera Settings
camera:
  # Exposure settings (only after sunset)
  exposure_time: 30.0  # seconds
  min_capture_interval_seconds: 90  # Prevent overlapping/too-frequent captures
  capture_timeout_seconds: 180  # Max wait for ImageReady before abort
  gain: null  # null = do not set (driver may not support Gain)
  offset: 10  # 0-100 
  binning: 1  # 1x1, 2x2, etc.
  apply_binning: false  # Enable only if your driver supports BinX/BinY reliably
  apply_gain: false  # Enable only if your driver supports Gain writes
  apply_cooling: false  # Enable only if your driver supports cooling control
  
  # Temperature control (if supported)
  cooling_enabled: false  # Current driver reports CanSetCCDTemperature=False
  target_temperature: -10  # degrees Celsius
  temperature_tolerance: 2  # degrees
  
  # Image settings
  image_format: "jpg"
  quality: 90  # JPEG quality 1-100
  
# Night-only operation
schedule:
  capture_after_sunset_offset: 0  # minutes after sunset to start (negative = before sunset)
  capture_before_sunrise_offset: 0  # minutes before sunrise to stop
  daytime_placeholder: "/assets/logo-impacton.jpg"  # Image shown during day

# Image storage
storage:
  save_path: "data/allsky"  # Relative to src/ directory
  filename_pattern: "allsky_{timestamp}.jpg"  # {timestamp} = YYYYMMDD_HHMMSS
  keep_latest_only: true  # If true, only keeps most recent image
  archive_images: false  # If true, keeps all images
  archive_path: "data/allsky_archive"
  retention_days: 7

# Image processing (post-capture)
processing:
  auto_stretch: true  # Enhance contrast
  denoise: false
  preserve_aspect_ratio: true  # Keep original proportions when resizing
  resize_width: 1920  # Set one dimension or both; aspect is preserved
  resize_height: null
  watermark: true
  watermark_text: "OASI - {timestamp}"
  watermark_position: "bottom-right"  # top-left, top-right, bottom-left, bottom-right

# Metadata
metadata:
  location: "Observatório Astronômico do Sertão de Itaparica"
  latitude: -8.79225
  longitude: -38.68853
  altitude: 390  # meters

# Error handling
error_handling:
  use_placeholder_on_error: true
  placeholder_image: "/assets/logo-impacton.jpg"
  log_errors: true
